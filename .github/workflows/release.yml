name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm quality:gate
      - name: Use npm with trusted publishing support
        run: npm install --global npm@11.18.0
      - name: Publish with provenance
        working-directory: packages/cli
        run: npm publish --provenance --access public --registry=https://registry.npmjs.org
      - name: Verify official registry installation
        run: node scripts/verifyRegistryInstall.mjs "${GITHUB_REF_NAME#v}"
